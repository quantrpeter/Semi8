<svg xmlns="http://www.w3.org/2000/svg" width="980" height="700" viewBox="0 0 980 700" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#334155"/>
    </marker>
    <marker id="arrowlite" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="700" fill="#ffffff"/>

  <!-- Title -->
  <text x="490" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#0f172a">Open8 - Single-Cycle Harvard Soft Core</text>
  <text x="490" y="56" text-anchor="middle" font-size="13" fill="#64748b">open8_top : CPU core + program ROM + data SRAM + 8-bit I/O port</text>

  <!-- ===================== CPU CORE ===================== -->
  <rect x="250" y="90" width="470" height="545" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="266" y="112" font-size="14" font-weight="bold" fill="#334155">open8_core  (single-cycle datapath)</text>

  <!-- Decoder -->
  <rect x="270" y="128" width="430" height="62" rx="6" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="485" y="153" text-anchor="middle" font-size="14" font-weight="bold" fill="#3730a3">Instruction Decoder &amp; Control Unit</text>
  <text x="485" y="172" text-anchor="middle" font-size="11" fill="#4f46e5">casez(ir) -&gt; reg / ALU / mem / io / branch control</text>

  <!-- PC -->
  <rect x="270" y="214" width="135" height="54" rx="6" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="337" y="238" text-anchor="middle" font-size="13" font-weight="bold" fill="#3730a3">PC</text>
  <text x="337" y="256" text-anchor="middle" font-size="11" fill="#4f46e5">16-bit (64K words)</text>

  <!-- Next PC -->
  <rect x="430" y="214" width="135" height="54" rx="6" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="497" y="234" text-anchor="middle" font-size="12" font-weight="bold" fill="#3730a3">Next-PC logic</text>
  <text x="497" y="251" text-anchor="middle" font-size="10.5" fill="#4f46e5">+1 / +2 (2-word)</text>
  <text x="497" y="263" text-anchor="middle" font-size="10.5" fill="#4f46e5">branch / rjmp</text>

  <!-- Register File -->
  <rect x="270" y="305" width="180" height="135" rx="6" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="360" y="330" text-anchor="middle" font-size="13" font-weight="bold" fill="#3730a3">Register File</text>
  <text x="360" y="350" text-anchor="middle" font-size="11" fill="#4f46e5">32 x 8-bit  (R0-R31)</text>
  <text x="360" y="368" text-anchor="middle" font-size="11" fill="#4f46e5">2 read / 1 write</text>
  <text x="360" y="392" text-anchor="middle" font-size="10.5" fill="#64748b">X = R27:R26</text>
  <text x="360" y="407" text-anchor="middle" font-size="10.5" fill="#64748b">Y = R29:R28</text>
  <text x="360" y="422" text-anchor="middle" font-size="10.5" fill="#64748b">Z = R31:R30</text>

  <!-- ALU -->
  <rect x="510" y="305" width="190" height="95" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="605" y="330" text-anchor="middle" font-size="13" font-weight="bold" fill="#991b1b">ALU</text>
  <text x="605" y="350" text-anchor="middle" font-size="10.5" fill="#b91c1c">add . adc . sub . sbc . cp</text>
  <text x="605" y="365" text-anchor="middle" font-size="10.5" fill="#b91c1c">and . or . eor . com . neg</text>
  <text x="605" y="380" text-anchor="middle" font-size="10.5" fill="#b91c1c">lsl/lsr/asr/ror . inc/dec</text>
  <text x="605" y="394" text-anchor="middle" font-size="10.5" fill="#b91c1c">swap . immediate ops</text>

  <!-- SREG -->
  <rect x="510" y="420" width="190" height="56" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="605" y="441" text-anchor="middle" font-size="12" font-weight="bold" fill="#9a3412">SREG (status)</text>
  <text x="605" y="461" text-anchor="middle" font-size="11" fill="#c2410c" font-family="monospace">I T H S V N Z C</text>

  <!-- Memory interface note -->
  <rect x="270" y="500" width="430" height="44" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="485" y="520" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#475569">Load / Store unit  (LDS . STS . IN . OUT)</text>
  <text x="485" y="536" text-anchor="middle" font-size="10.5" fill="#64748b">address from ir2 (2nd word) . async read . sync write</text>

  <!-- ===================== PROGRAM MEMORY ===================== -->
  <rect x="30" y="150" width="185" height="118" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="122" y="178" text-anchor="middle" font-size="13" font-weight="bold" fill="#065f46">Program Memory</text>
  <text x="122" y="198" text-anchor="middle" font-size="11" fill="#047857">open8_pmem (ROM)</text>
  <text x="122" y="216" text-anchor="middle" font-size="11" fill="#047857">4K x 16-bit words</text>
  <text x="122" y="234" text-anchor="middle" font-size="10.5" fill="#059669">dual async read</text>
  <text x="122" y="251" text-anchor="middle" font-size="10.5" fill="#059669">$readmemh(program.hex)</text>

  <!-- ===================== I/O PORT ===================== -->
  <rect x="765" y="118" width="185" height="100" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="857" y="146" text-anchor="middle" font-size="13" font-weight="bold" fill="#9a3412">I/O Port 0</text>
  <text x="857" y="168" text-anchor="middle" font-size="11" fill="#c2410c">port_in  -&gt; IN</text>
  <text x="857" y="186" text-anchor="middle" font-size="11" fill="#c2410c">OUT -&gt; port_out</text>
  <text x="857" y="206" text-anchor="middle" font-size="10.5" fill="#ea580c">+ 1-cycle write strobe</text>

  <!-- ===================== DATA MEMORY ===================== -->
  <rect x="765" y="305" width="185" height="110" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="857" y="333" text-anchor="middle" font-size="13" font-weight="bold" fill="#065f46">Data Memory</text>
  <text x="857" y="354" text-anchor="middle" font-size="11" fill="#047857">open8_dmem (SRAM)</text>
  <text x="857" y="372" text-anchor="middle" font-size="11" fill="#047857">4K x 8-bit</text>
  <text x="857" y="392" text-anchor="middle" font-size="10.5" fill="#059669">async rd / sync wr</text>

  <!-- ===================== DEBUG ===================== -->
  <rect x="765" y="470" width="185" height="100" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="857" y="498" text-anchor="middle" font-size="13" font-weight="bold" fill="#5b21b6">Debug Port</text>
  <text x="857" y="519" text-anchor="middle" font-size="11" fill="#6d28d9">dbg_addr -&gt; dbg_data</text>
  <text x="857" y="537" text-anchor="middle" font-size="11" fill="#6d28d9">dbg_pc . dbg_sreg</text>
  <text x="857" y="556" text-anchor="middle" font-size="10.5" fill="#7c3aed">read-only introspection</text>

  <!-- ===================== WIRES ===================== -->
  <!-- PC -> Program Memory (address) -->
  <line x1="270" y1="245" x2="215" y2="225" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="225" y="262" text-anchor="end" font-size="10" fill="#475569">pmem_addr_a/b</text>

  <!-- Program Memory -> Decoder (instruction) -->
  <polyline points="215,170 240,170 240,150 270,150" fill="none" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="243" y="140" font-size="10" fill="#475569">ir, ir2 [16]</text>

  <!-- Decoder -> PC region (control) -->
  <line x1="337" y1="190" x2="337" y2="214" stroke="#64748b" stroke-width="1.4" marker-end="url(#arrowlite)"/>
  <line x1="497" y1="190" x2="497" y2="214" stroke="#64748b" stroke-width="1.4" marker-end="url(#arrowlite)"/>

  <!-- Next-PC -> PC -->
  <line x1="430" y1="241" x2="405" y2="241" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="417" y="233" text-anchor="middle" font-size="9.5" fill="#475569">pc_n</text>

  <!-- Decoder -> Register File (control) -->
  <line x1="300" y1="190" x2="300" y2="305" stroke="#64748b" stroke-width="1.4" marker-end="url(#arrowlite)"/>
  <text x="296" y="290" text-anchor="end" font-size="9.5" fill="#475569">rd/rr/we</text>

  <!-- Register File -> ALU (operands) -->
  <line x1="450" y1="345" x2="510" y2="345" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="480" y="338" text-anchor="middle" font-size="9.5" fill="#475569">a, b [8]</text>

  <!-- ALU -> Register File (writeback) -->
  <polyline points="510,388 470,388 470,430 450,430" fill="none" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="486" y="404" text-anchor="middle" font-size="9.5" fill="#475569">result</text>

  <!-- ALU -> SREG (flags) -->
  <line x1="605" y1="400" x2="605" y2="420" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="635" y="414" text-anchor="middle" font-size="9.5" fill="#475569">flags</text>

  <!-- SREG -> ALU/Decoder (carry-in / branch cond) -->
  <polyline points="510,448 490,448 490,360 510,360" fill="none" stroke="#64748b" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arrowlite)"/>
  <text x="476" y="405" text-anchor="middle" font-size="9" fill="#64748b">C / cond</text>

  <!-- Core <-> I/O -->
  <line x1="720" y1="160" x2="765" y2="160" stroke="#ea580c" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="742" y="153" text-anchor="middle" font-size="9.5" fill="#9a3412">io wr</text>
  <line x1="765" y1="185" x2="720" y2="185" stroke="#ea580c" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="742" y="198" text-anchor="middle" font-size="9.5" fill="#9a3412">io rd</text>

  <!-- Core <-> Data Memory -->
  <line x1="720" y1="345" x2="765" y2="345" stroke="#059669" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="742" y="338" text-anchor="middle" font-size="9" fill="#065f46">addr/we/wd</text>
  <line x1="765" y1="375" x2="720" y2="375" stroke="#059669" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="742" y="388" text-anchor="middle" font-size="9.5" fill="#065f46">rdata</text>

  <!-- Core -> Debug -->
  <line x1="720" y1="520" x2="765" y2="520" stroke="#7c3aed" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- ===================== CLOCK / RESET ===================== -->
  <text x="266" y="612" font-size="11" fill="#475569">clk : posedge state update   .   rst_n : async reset (PC=0, regs=0, SREG=0)</text>
  <text x="266" y="628" font-size="11" fill="#475569">1 instruction / clock  .  combinational ROM &amp; SRAM read  .  no hazards</text>

  <!-- ===================== LEGEND ===================== -->
  <rect x="30" y="470" width="185" height="100" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="40" y="490" font-size="11" font-weight="bold" fill="#475569">Legend</text>
  <rect x="40" y="500" width="14" height="11" fill="#eef2ff" stroke="#4f46e5"/><text x="60" y="510" font-size="10" fill="#475569">control / datapath</text>
  <rect x="40" y="517" width="14" height="11" fill="#ecfdf5" stroke="#059669"/><text x="60" y="527" font-size="10" fill="#475569">memory</text>
  <rect x="40" y="534" width="14" height="11" fill="#fef2f2" stroke="#dc2626"/><text x="60" y="544" font-size="10" fill="#475569">ALU</text>
  <rect x="40" y="551" width="14" height="11" fill="#fff7ed" stroke="#ea580c"/><text x="60" y="561" font-size="10" fill="#475569">I/O &amp; status</text>
</svg>
